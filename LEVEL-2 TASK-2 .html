<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Quiz Maker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(120deg,#6a11cb,#2575fc);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* MAIN CONTAINER */

.container{
width:90%;
max-width:1000px;
background:white;
border-radius:15px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* HEADER */

h1{
color:#2575fc;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

/* BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

button{
border:none;
padding:14px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.create{
background:#6a11cb;
color:white;
}

.take{
background:#2575fc;
color:white;
}

button:hover{
transform:scale(1.05);
}

/* QUIZ CARD */

.quiz-card{
background:#f5f7ff;
padding:25px;
border-radius:10px;
text-align:left;
margin-top:20px;
}

.quiz-card h3{
margin-bottom:15px;
color:#333;
}

.option{
background:white;
padding:10px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
border:1px solid #ddd;
}

.option:hover{
background:#e9efff;
}

/* FOOTER */

footer{
margin-top:30px;
color:#777;
font-size:14px;
}

</style>
</head>


<body>

<div class="container">

<h1>🧠 Online Quiz Maker</h1>

<p class="subtitle">Create quizzes or test your knowledge instantly</p>

<div class="buttons">

<button class="create">Create Quiz</button>

<button class="take">Take Quiz</button>

</div>

<div class="quiz-card">

<h3>Sample Question</h3>

<p>Which language is used for web development?</p>

<div class="option">Python</div>
<div class="option">JavaScript</div>
<div class="option">C++</div>
<div class="option">Java</div>

</div>

<footer>

<p>© 2026 Online Quiz Maker</p>

</footer>

</div>

</body>
</html>
